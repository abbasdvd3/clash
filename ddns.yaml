ipv6: false
udp: true
udp-idle-timeout: 300
unified-delay: true
tcp-concurrent: true
find-process-mode: always

profile:
  store-selected: true
  store-fake-ip: true
geodata-mode: true
geox-url:
  geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat"
  geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country.mmdb"

tun:
  enable: true
  stack: gvisor
  auto-route: true
  auto-detect-interface: true
  strict-route: false
  mtu: 1400
  dns-hijack:
    - any:53

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
      override-destination: true
  force-dns-mapping: true
  parse-pure-ip: true

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  use-hosts: true
  respect-rules: true
  proxy-server-nameserver: [223.5.5.5, 119.29.29.29]
  default-nameserver: [223.5.5.5, 119.29.29.29]
  nameserver:
    - https://doh.pub/dns-query
    - https://1.12.12.12/dns-query
    - https://120.53.53.53/dns-query
    - 119.29.29.29
    - 119.28.28.28
  fallback:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
    - https://public.dns.iij.jp/dns-query
    - https://doh.dns.apple.com/dns-query

  fallback-filter:
    geoip: true
    geoip-code: ir
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32
 # nameserver-policy:
   # "geosite:cn":
 #     - https://doh.pub/dns-query
  #    - https://1.12.12.12/dns-query
  #    - https://120.53.53.53/dns-query
 #   "geosite:google,google-play,openai,tiktok,telegram,netflix,youtube,geolocation-!cn":
  #    - https://cloudflare-dns.com/dns-query
  #    - https://dns.google/dns-query
 #     - https://public.dns.iij.jp/dns-query

  fake-ip-filter:
    - "*.lan"
    - "localhost"
    - "+.local"
    - "+.localdomain"
    - "time.*"
    - "ntp.*"
    # 国内常见（避免某些国内App被 fake-ip 影响）
    - "+.qq.com"
    - "+.tencent.com"
    - "+.weixin.com"
    - "+.wechat.com"
    - "+.qpic.cn"
    - "+.gtimg.com"
    - "+.tenpay.com"
    - "+.alipay.com"
    - "+.alipayobjects.com"
    - "+.taobao.com"
    - "+.tmall.com"
    - "+.alicdn.com"
    - "+.aliyun.com"
    - "+.aliyuncs.com"
    - "+.jd.com"
    - "+.360buyimg.com"
    - "+.meituan.com"
    - "+.sankuai.com"
    - "+.baidu.com"
    - "+.bdstatic.com"
    - "+.bcebos.com"
    - "+.bilibili.com"
    - "+.hdslb.com"
    - "+.douyin.com"
    - "+.douyimg.com"
    - "+.toutiao.com"
    - "+.byteimg.com"
    - "+.ibytedtos.com"
    - "+.cn"
    - "+.xn--fiqs8s"

