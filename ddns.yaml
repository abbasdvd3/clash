# ==========================================================
# ✅ 规则（广告 → Play/AI/TikTok/媒体 → 国内直连 → 海外兜底）
# ==========================================================
rules:
  # 局域网直连
  - DOMAIN-SUFFIX,local,DIRECT
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,100.64.0.0/10,DIRECT,no-resolve

  # --------------------------
  # 🚫 广告拦截（尽量多拦，但不保证“所有App广告都能去掉”）
  # --------------------------
  - RULE-SET,AdGuardSDNSFilter,REJECT
  - RULE-SET,AntiAD,REJECT
 # - GEOSITE,category-ads-all,REJECT

  # --------------------------
  # Play / Google
  # --------------------------
#  - GEOSITE,google-play,Play
#  - GEOSITE,google,Play
  - DOMAIN,play.googleapis.com,Play
  - DOMAIN,android.clients.google.com,Play
  - DOMAIN,dl.google.com,Play
  - DOMAIN,redirector.gvt1.com,Play
  - DOMAIN-SUFFIX,googleapis.com,Play
  - DOMAIN-SUFFIX,gstatic.com,Play
  - DOMAIN-SUFFIX,ggpht.com,Play
  - DOMAIN-SUFFIX,googleusercontent.com,Play
  - DOMAIN-SUFFIX,gvt1.com,Play
  - DOMAIN-SUFFIX,googlevideo.com,Play

  # --------------------------
  # AI
  # --------------------------
#  - GEOSITE,openai,AI-Only
  - DOMAIN-SUFFIX,openai.com,AI-Only
