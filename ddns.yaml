ipv6: false
udp: true
udp-idle-timeout: 300
unified-delay: true
tcp-concurrent: true
find-process-mode: always

profile:
  store-selected: true
  store-fake-ip: true

# --------------------------
# 🌍 Geo 数据（GEOSITE / GEOIP 必须可用）
# --------------------------
geodata-mode: true
geox-url:
  geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat"
  geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country.mmdb"

# --------------------------
# 🧪 TUN：抓全App（提升“有些App不听话”的启动与加载）
# --------------------------
tun:
  enable: true
  stack: gvisor
  auto-route: true
  auto-detect-interface: true
  strict-route: false
  mtu: 1400
  dns-hijack:
    - any:53

# --------------------------
# 🔎 Sniffer：识别走IP/UDP的App，让分流更准确（对TikTok/直播有用）
# --------------------------
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
      override-destination: true
  force-dns-mapping: true
  parse-pure-ip: true

# --------------------------
# 🧠 DNS（Fake-IP + 分流尊重规则）
# 国内用国内DNS，海外域名强制海外DNS（更快更稳）
# --------------------------
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  use-hosts: true
  respect-rules: true

  proxy-server-nameserver: [223.5.5.5, 119.29.29.29]
  default-nameserver: [223.5.5.5, 119.29.29.29]

  nameserver:
    - https://doh.pub/dns-query
    - https://1.12.12.12/dns-query
    - https://120.53.53.53/dns-query
    - 119.29.29.29
    - 119.28.28.28

  fallback:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
    - https://public.dns.iij.jp/dns-query
    - https://doh.dns.apple.com/dns-query

  fallback-filter:
    geoip: true
    geoip-code: ir
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32

 # nameserver-policy:
   # "geosite:cn":
 #     - https://doh.pub/dns-query
  #    - https://1.12.12.12/dns-query
  #    - https://120.53.53.53/dns-query

 #   "geosite:google,google-play,openai,tiktok,telegram,netflix,youtube,geolocation-!cn":
  #    - https://cloudflare-dns.com/dns-query
  #    - https://dns.google/dns-query
 #     - https://public.dns.iij.jp/dns-query

  fake-ip-filter:
    - "*.lan"
    - "localhost"
    - "+.local"
    - "+.localdomain"
    - "time.*"
    - "ntp.*"
    # 国内常见（避免某些国内App被 fake-ip 影响）
    - "+.qq.com"
    - "+.tencent.com"
    - "+.weixin.com"
    - "+.wechat.com"
    - "+.qpic.cn"
    - "+.gtimg.com"
    - "+.tenpay.com"
    - "+.alipay.com"
    - "+.alipayobjects.com"
    - "+.taobao.com"
    - "+.tmall.com"
    - "+.alicdn.com"
    - "+.aliyun.com"
    - "+.aliyuncs.com"
    - "+.jd.com"
    - "+.360buyimg.com"
    - "+.meituan.com"
    - "+.sankuai.com"
    - "+.baidu.com"
    - "+.bdstatic.com"
    - "+.bcebos.com"
    - "+.bilibili.com"
    - "+.hdslb.com"
    - "+.douyin.com"
    - "+.douyimg.com"
    - "+.toutiao.com"
    - "+.byteimg.com"
    - "+.ibytedtos.com"
    - "+.cn"
    - "+.xn--fiqs8s"

# ==========================================================
# ✅ 订阅 Provider（已修复 header slice 报错：全部使用数组写法）
# ==========================================================
proxy-providers:
  sub:
    type: http
    url: "https://tk-01-cn-hk-cdn.dy-dlam-2.xyz/viewConfig/250f016ca93351ca8c12bff55a7b50b8"
    interval: 900
    path: "./proxy_providers/sub.yaml"
    header:
      User-Agent: ["ClashforWindows"]
      Accept: ["*/*"]
      Connection: ["keep-alive"]
    health-check:
      enable: true
      url: "https://cp.cloudflare.com/generate_204"
      interval: 300

# ==========================================================
# ✅ 规则集（广告尽量少）
# ==========================================================
rule-providers:
  AdGuardSDNSFilter:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/AdguardTeam/AdGuardSDNSFilter/master/Filters/filter.txt"
    path: "./rule_providers/adguard_sdnsfilter.yaml"
    interval: 86400

  AntiAD:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/privacy-protection-tools/anti-AD/master/anti-ad-domains.txt"
    path: "./rule_providers/antiad_domains.yaml"
    interval: 86400

# ==========================================================
# ✅ 强力“伪节点/公告节点”过滤（你截图里那种：定期/下方/地址/流量重置/TG/返利等）
# ==========================================================
# 说明：这是正则，匹配到就会被“从所有组里剔除”
# ==========================================================
# ✅ 重点新增：定期 / 下方 / 地址 / 更新（解决你最后漏掉那条）
# ==========================================================
# 注意：每个 use:["sub"] 的组都用了同一套 exclude-filter
