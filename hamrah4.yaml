mixed-port: 7890
tcp-concurrent: false
allow-lan: true
ipv6: true
mode: Rule
log-level: info
global-client-fingerprint: chrome
find-process-mode: strict
external-controller: 0.0.0.0:9090
geodata-mode: true
geo-auto-update: true
geo-update-interval: 3

profile:
  store-selected: true
  store-fake-ip: true
sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports:
      - 80
      - 8080-8800
      override-destination: true
    TLS:
      ports:
      - 443
      - 8443
    QUIC:
      ports:
      - 443
      - 8443
  skip-domain:
  - Mijia Cloud
  - dlg.io.mi.com
  - +.apple.com
tun:
  enable: false
  stack: mixed
  dns-hijack:
  - any:53
  auto-route: true
  auto-detect-interface: true
dns:
  enable: true
  ipv6: true
  prefer-h3: true
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
  - '*.lan'
  - cable.auth.com
  - +.msftconnecttest.com
  - +.msftncsi.com
  - network-test.debian.org
  - detectportal.firefox.com
  - resolver1.opendns.com
  - +.srv.nintendo.net
  - +.stun.playstation.net
  - xbox.*.microsoft.com
  - +.xboxlive.com
  - stun.*
  - global.turn.twilio.com
  - global.stun.twilio.com
  - localhost.*.qq.com
  - +.logon.battlenet.com.cn
  - +.logon.battle.net
  - +.blzstatic.cn
  - +.cmpassport.com
  - id6.me
  - open.e.189.cn
  - mdn.open.wo.cn
  - opencloud.wostore.cn
  - auth.wosms.cn
  - +.jegotrip.com.cn
  - +.icitymobile.mobi
  - +.pingan.com.cn
  - +.cmbchina.com
  - +.cmbchina.com.cn
  - pool.ntp.org
  - +.pool.ntp.org
  - ntp.*.com
  - time.*.com
  - ntp?.*.com
  - time?.*.com
  - time.*.gov
  - time.*.edu.cn
  - +.ntp.org.cn
  - time.*.apple.com
  default-nameserver:
  - 223.5.5.5
  - 119.29.29.29
  nameserver-policy:
    www.baidu.com: 114.114.114.114
    +.internal.crop.com: 10.0.0.1
    www.baidu.com,+.google.com: https://doh.pub/dns-query
#    geosite:private,apple: https://dns.alidns.com/dns-query
#    rule-set:google: 8.8.8.8
  nameserver:
  - https://doh.pub/dns-query
  - https://dns.alidns.com/dns-query
  fallback:
  - https://1.1.1.2/dns-query
  - https://1.0.0.2/dns-query
  - https://208.67.222.222/dns-query
  - https://208.67.220.220/dns-query
  - https://9.9.9.9/dns-query
  fallback-filter:
    geoip: true
#    geoip-code: 
    geosite:

    ipcidr:
    - 240.0.0.0/4
    - 0.0.0.0/32
    domain:
    - +.github.com
proxies:
proxy-groups:
  - name: PROXY
    type: select
    icon: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/icon/qure/color/Rocket.png
#    include-all-providers: true
    proxies:
      - 🟢Auto🟢
      - 🟡fallback🟡
      - 🔴load-balance🔴
      - 🟢Shadowsocks🟢
      - 🟢ShadowsocksR🟢
      - 🟢Vmess🟢
      - 🟢Vless🟢
      - 🟢Hysteria|Hysteria2🟢
      - 🟢Trojan🟢
      
  - name: 🟢Auto🟢
    type: url-test
    exclude-type: Direct|Reject|Pass|Compatible|RejectDrop|Dns|Trojan|Relay|Selector|Fallback|URLTest|LoadBalance|Ssh
    include-all-providers: true
    icon: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/icon/qure/color/Auto.png
    
  - name: 🟡fallback🟡
    type: fallback
    exclude-type: Direct|Reject|Pass|Compatible|RejectDrop|Dns|Trojan|Relay|Selector|Fallback|URLTest|LoadBalance|Ssh
    include-all-providers: true
    icon: http://raw.gitmirror.com/Koolson/Qure/master/IconSet/Color/Airport.png
    
  - name: 🔴load-balance🔴
    type: load-balance
    exclude-type: Direct|Reject|Pass|Compatible|RejectDrop|Dns|Trojan|Relay|Selector|Fallback|URLTest|LoadBalance|Ssh
    include-all-providers: true
    icon: http://raw.gitmirror.com/Koolson/Qure/master/IconSet/Color/Airport.png

  - name: 🟢Vmess🟢
    type: url-test
    exclude-type: Direct|Reject|Pass|Compatible|RejectDrop|Dns|Shadowsocks|ShadowsocksR|Snell|http|Vless|Trojan|Hysteria|Hysteria2|WireGuard|Mieru|AnyTLS|Sudoku|Relay|Selector|Fallback|URLTest|LoadBalance|Ssh|socks5
    include-all-providers: true
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png      
    
  - name: 🟢Vless🟢
    type: url-test
    exclude-type: Direct|Reject|Pass|Compatible|RejectDrop|Dns|Shadowsocks|ShadowsocksR|Snell|http|Vmess|Trojan|Hysteria|Hysteria2|WireGuard|Mieru|AnyTLS|Sudoku|Relay|Selector|Fallback|URLTest|LoadBalance|Ssh|socks5
    include-all-providers: true
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png  
    
  - name: 🟢Hysteria|Hysteria2🟢
    type: url-test
    exclude-type: Direct|Reject|Pass|Compatible|RejectDrop|Dns|Shadowsocks|ShadowsocksR|Snell|http|Vless|Trojan|Vmess|WireGuard|Mieru|AnyTLS|Sudoku|Relay|Selector|Fallback|URLTest|LoadBalance|Ssh|socks5
    include-all-providers: true
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png      
    
  - name: 🟢Trojan🟢
    type: url-test
    exclude-type: Direct|Reject|Pass|Compatible|RejectDrop|Dns|Shadowsocks|ShadowsocksR|Snell|http|Vless|Vmess|Hysteria|Hysteria2|WireGuard|Mieru|AnyTLS|Sudoku|Relay|Selector|Fallback|URLTest|LoadBalance|Ssh|socks5
    include-all-providers: true
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png      
    
  - name: 🟢Shadowsocks🟢
    type: url-test
    exclude-type: Direct|Reject|Pass|Compatible|RejectDrop|Dns|Vmess|ShadowsocksR|Snell|http|Vless|Trojan|Hysteria|Hysteria2|WireGuard|Mieru|AnyTLS|Sudoku|Relay|Selector|Fallback|URLTest|LoadBalance|Ssh|socks5
    include-all-providers: true
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png      
    
  - name: 🟢ShadowsocksR🟢
    type: url-test
    exclude-type: Direct|Reject|Pass|Compatible|RejectDrop|Dns|Shadowsocks|Vmess|Snell|http|Vless|Trojan|Hysteria|Hysteria2|WireGuard|Mieru|AnyTLS|Sudoku|Relay|Selector|Fallback|URLTest|LoadBalance|Ssh|socks5
    include-all-providers: true
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png      
    
  - name: 🎯 Direct
    type: select
    disable-udp: true
    icon: http://raw.gitmirror.com/Koolson/Qure/master/IconSet/Color/Airport.png
    proxies:
      - DIRECT
      - PROXY
  - name: 🛑 Reject
    type: select
    icon: https://fastly.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io/main/docs/assets/icons/block.svg
    proxies:
      - REJECT
      - DIRECT
      - PROXY
