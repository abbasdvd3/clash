mixed-port: 7890
tcp-concurrent: true  
allow-lan: true
ipv6: true
mode: rule
log-level: info
external-controller: 0.0.0.0:9090
unified-delay: false
experimental:
  ignore-resolve-fail: true
  sniff-tls-sni: true
  udp-fallback-match: true
profile:
  store-fake-ip: true
  store-selected: true
  tracing: true
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: true
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 1.1.1.1
  enhanced-mode: fake-ip
  fake-ip-range: 22.0.0.0/8
  fake-ip-filter:
    - "*"
    - "*.example"
    - "*.invalid"
    - "*.lan"
    - "*.local"
    - "*.localdomain"
    - "*.localhost"
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - dhcp://system
    - https://dns.alidns.com/dns-query
    - https://dns.cfiec.net/dns-query
    - https://doh.pub/dns-query
    - https://dns.ipv6dns.com/dns-query
    - https://rubyfish.cn/dns-query
    - https://all.dns.mullvad.net/dns-query
    - https://unfiltered.adguard-dns.com/dns-query
  fallback:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
    - https://doh.dns.sb/dns-query
    - https://dns.twnic.tw/dns-query
    - https://doh.opendns.com/dns-query
    - https://all.dns.mullvad.net/dns-query
    - https://dns.quad9.net/dns-query
  proxy-server-nameserver:
    - 178.22.122.100
    - 10.202.10.202
    - 78.157.42.100
  fallback-filter:
    ipcidr:
      - 0.0.0.0/32
      - 100.64.0.0/10
      - 127.0.0.0/8
      - 240.0.0.0/4
      - 255.255.255.255/32

proxies:
proxy-groups:
  - name: 'PROXY'
    type: 'select'
    proxies:
      - '⚡️ Fastest'
      - '📶 First Available'
      - '♻️ Load Balance'

  - name: '⚡️ Fastest'
    type: 'url-test'
    tolerance: 150
    url: 'https://www.gstatic.com/generate_204'
    interval: 300
    proxies:

  - name: '📶 First Available'
    type: 'fallback'
    url: 'https://www.gstatic.com/generate_204'
    interval: 300
    proxies:

  - name: '♻️ Load Balance'
    type: 'load-balance'
    url: 'https://www.gstatic.com/generate_204'
    interval: 300
    strategy: 'consistent-hashing'
    proxies:

