    path: ./ruleset/private.txt
    interval: 86400

rules:
  - IP-CIDR,10.10.34.0/24,PROXY
  - RULE-SET,private,DIRECT,no-resolve
  - RULE-SET,apps,DIRECT
  - RULE-SET,ads,REJECT
  - RULE-SET,malware,REJECT
  - RULE-SET,phishing,REJECT
  - RULE-SET,cryptominers,REJECT
  - RULE-SET,ir,DIRECT
  - RULE-SET,ircidr,DIRECT
  - MATCH,PROXY
port: 7890
socks-port: 7891
mixed-port: 7890
redir-port: 9797
tproxy-port: 9898
mode: rule
allow-lan: true
unified-delay: true
auto-redir: true
enable-process: true
bind-address: '*'
log-level: silent
ipv6: false
external-controller: 0.0.0.0:9090 
external-ui: 
find-process-mode: always 

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: false
  override-destination: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
  force-domain:
    - '+.v2ex.com'
  skip-domain:
    - '+.google.com'
  sniffing:
    - tls
    - http
  port-whitelist:
    - "80"
    - "443"
tun:
  enable: true
  device: utun
  mtu: 9000
  stack: system
  dns-hijack:
    - any:53
    - tcp://any:53
  auto-route: true
  auto-detect-interface: true
  inet4-address: 172.19.0.1/30
  inet6-address: [fdfe:dcba:9876::1/126]
  # include_android_user:
    # - 0
    # - 10
  # include_package:
  # - com.android.chrome
  # exclude_package:
    # - com.whatsapp

proxies:

proxy-groups:
  - name: "PROXY"
    type: select
    proxies:
      - "FALLBACK"
      - "URL-TEST"

  - name: "FALLBACK"
    type: fallback
    include-all-providers: true

  - name: "URL-TEST"
    type: url-test
    include-all-providers: true

  - name: "block"
    type: select
    proxies:
      - "FALLBACK"
      - "REJECT"
